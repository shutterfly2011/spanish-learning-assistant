services:
  spanish-assistant:
    build: .
    ports:
      - "8501:8501"
    environment:
      # LLM Provider: "ollama" or "bedrock"
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}

      # Ollama settings
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}

      # Bedrock settings (credentials required for Bedrock)
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - BEDROCK_MODEL_ID=${BEDROCK_MODEL_ID:-anthropic.claude-3-sonnet-20240229-v1:0}
    volumes:
      # Mount config file if you want to use one
      - ./config.yaml:/app/config.yaml:ro
    restart: unless-stopped

    # For accessing Ollama on the host machine from Docker
    extra_hosts:
      - "host.docker.internal:host-gateway"
